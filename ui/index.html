<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>UMMG · Gateway Console</title>
<style>
  :root {
    --bg:#0d1117; --panel:#161b22; --panel2:#1c2330; --border:#2a3340;
    --txt:#e6edf3; --muted:#8b949e; --accent:#58a6ff; --ok:#3fb950;
    --warn:#d29922; --err:#f85149; --chip:#21262d;
    --mono:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; background:var(--bg); color:var(--txt); font-family:var(--sans); font-size:14px; }
  header { display:flex; align-items:center; gap:12px; padding:12px 18px;
    background:var(--panel); border-bottom:1px solid var(--border); position:sticky; top:0; z-index:5; flex-wrap:wrap; }
  header h1 { font-size:16px; margin:0; font-weight:600; letter-spacing:.3px; }
  header h1 span { color:var(--accent); }
  .grow { flex:1; }
  input, button, select { font-family:var(--sans); font-size:13px; }
  input[type=password], input[type=text] {
    background:var(--panel2); border:1px solid var(--border); color:var(--txt);
    border-radius:6px; padding:7px 10px; outline:none; }
  input:focus { border-color:var(--accent); }
  button { background:var(--chip); border:1px solid var(--border); color:var(--txt);
    border-radius:6px; padding:7px 12px; cursor:pointer; }
  button:hover { border-color:var(--accent); }
  button.primary { background:var(--accent); border-color:var(--accent); color:#03101f; font-weight:600; }
  .wrap { padding:18px; max-width:1200px; margin:0 auto; }
  .dot { width:9px; height:9px; border-radius:50%; display:inline-block; margin-right:6px; }
  .dot.ok{background:var(--ok)} .dot.err{background:var(--err)} .dot.warn{background:var(--warn)} .dot.idle{background:var(--muted)}
  .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(170px,1fr)); gap:12px; margin-bottom:18px; }
  .card { background:var(--panel); border:1px solid var(--border); border-radius:10px; padding:14px 16px; }
  .card .label { color:var(--muted); font-size:11px; text-transform:uppercase; letter-spacing:.6px; }
  .card .value { font-size:22px; font-weight:600; margin-top:6px; }
  .card .sub { color:var(--muted); font-size:12px; margin-top:4px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:10px; margin-bottom:18px; overflow:hidden; }
  .panel h2 { font-size:13px; margin:0; padding:11px 16px; border-bottom:1px solid var(--border);
    background:var(--panel2); font-weight:600; letter-spacing:.3px; display:flex; align-items:center; gap:8px; }
  .panel .body { padding:14px 16px; }
  table { width:100%; border-collapse:collapse; font-size:12.5px; }
  th, td { text-align:left; padding:8px 10px; border-bottom:1px solid var(--border); vertical-align:top; }
  th { color:var(--muted); font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:.4px; }
  td.mono, .mono { font-family:var(--mono); }
  .chip { display:inline-block; background:var(--chip); border:1px solid var(--border);
    border-radius:20px; padding:2px 9px; font-size:11px; margin:2px 4px 2px 0; }
  .chip.zai{color:#79c0ff} .chip.anthropic{color:#d2a8ff} .chip.minimax{color:#7ee787}
  .chip.local{color:#ffa657} .role-user{color:var(--accent)} .role-assistant{color:var(--ok)} .role-summary{color:var(--warn)}
  .muted { color:var(--muted); }
  .searchrow { display:flex; gap:8px; margin-bottom:12px; }
  .searchrow input { flex:1; }
  .err-banner { background:rgba(248,81,73,.12); border:1px solid var(--err); color:#ffb4ae;
    border-radius:8px; padding:10px 14px; margin-bottom:14px; display:none; }
  .small { font-size:12px; }
  pre { white-space:pre-wrap; word-break:break-word; margin:0; font-family:var(--mono); font-size:12px; }
  .toolbar { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
  label.inline { color:var(--muted); font-size:12px; display:flex; align-items:center; gap:6px; }
</style>
</head>
<body>
<header>
  <h1>UMMG <span>Gateway Console</span></h1>
  <span id="health"><span class="dot idle"></span><span class="small muted">not connected</span></span>
  <div class="grow"></div>
  <div class="toolbar">
    <input type="password" id="token" placeholder="Bearer token" size="26" />
    <span id="tokenSrc" class="small muted"></span>
    <button id="save" class="primary">Connect</button>
    <label class="inline"><input type="checkbox" id="auto" checked /> auto-refresh</label>
    <button id="refresh">Refresh</button>
  </div>
</header>

<div class="wrap">
  <div id="banner" class="err-banner"></div>

  <div class="cards" id="cards"></div>

  <div class="panel">
    <h2>Memory search</h2>
    <div class="body">
      <div class="searchrow">
        <input type="text" id="q" placeholder="Semantic query across stored memory…" />
        <button id="searchBtn">Search</button>
      </div>
      <div id="searchResults" class="muted small">Enter a query to retrieve the top matches from the vector store.</div>
    </div>
  </div>

  <div class="panel">
    <h2>Recent events <span id="evCount" class="muted small"></span></h2>
    <div class="body" style="padding:0;">
      <table id="eventsTable">
        <thead><tr><th>time</th><th>role</th><th>model</th><th>adapter</th><th>text</th></tr></thead>
        <tbody><tr><td colspan="5" class="muted" style="padding:14px;">connect to load events</td></tr></tbody>
      </table>
    </div>
  </div>

  <div class="panel">
    <h2>Recent traces <span id="trInfo" class="muted small"></span></h2>
    <div class="body" style="padding:0;">
      <table id="tracesTable">
        <thead><tr><th>time</th><th>model</th><th>adapter</th><th>latency</th><th>response</th></tr></thead>
        <tbody><tr><td colspan="5" class="muted" style="padding:14px;">tracing off or no traces yet</td></tr></tbody>
      </table>
    </div>
  </div>
</div>

<script>
const $ = s => document.querySelector(s);
let TOKEN = localStorage.getItem("ummg_token") || "";
$("#token").value = TOKEN;
let timer = null;

function hdr() { return { "Authorization": "Bearer " + TOKEN, "Content-Type": "application/json" }; }
function banner(msg) { const b=$("#banner"); if(!msg){b.style.display="none";return;} b.textContent=msg; b.style.display="block"; }
function fmtTime(ts){ if(!ts) return "—"; const d=new Date(ts*1000); return d.toLocaleTimeString(); }
function esc(s){ return (s==null?"":String(s)).replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c])); }
function chip(name){ return `<span class="chip ${esc(name)}">${esc(name)}</span>`; }

async function api(path, opts){
  const r = await fetch(path, Object.assign({ headers: hdr() }, opts||{}));
  if (r.status === 401) throw new Error("401 — bad or missing bearer token");
  if (!r.ok) throw new Error(r.status + " " + (await r.text()).slice(0,160));
  return r.json();
}

// Try to auto-fill the token from the gateway's .env (loopback-only endpoint).
// Falls back silently if the endpoint is missing or disabled.
async function tryAutoFillToken(){
  try {
    const r = await fetch("/v1/admin/dev_token", { cache: "no-store" });
    if (!r.ok) return false;
    const d = await r.json();
    if (d && typeof d.token === "string" && d.token.length > 0) {
      TOKEN = d.token;
      $("#token").value = TOKEN;
      const tag = document.getElementById("tokenSrc");
      if (tag) tag.textContent = "auto-filled from .env";
      return true;
    }
  } catch(e) { /* swallow — manual paste still works */ }
  return false;
}

async function loadHealth(){
  try {
    const h = await (await fetch("/health")).json();
    const ok = h.ok;
    $("#health").innerHTML = `<span class="dot ${ok?'ok':'err'}"></span><span class="small">${ok?'healthy':'degraded'}</span>`;
    return h;
  } catch(e){ $("#health").innerHTML = `<span class="dot err"></span><span class="small">unreachable</span>`; return null; }
}

function card(label, value, sub){
  return `<div class="card"><div class="label">${esc(label)}</div><div class="value">${value}</div>${sub?`<div class="sub">${sub}</div>`:""}</div>`;
}

async function loadOverview(){
  const o = await api("/v1/admin/overview");
  const lat = o.latency || {};
  const ups = (o.upstreams||[]).map(chip).join("");
  $("#cards").innerHTML = [
    card("Vector backend", esc(o.vector_backend), o.tracing_enabled?"tracing on":"tracing off"),
    card("Models", (o.models||[]).length, ups),
    card("Events stored", o.events_total==null?"—":o.events_total, o.has_summary?"rolling summary ✓":"no summary yet"),
    card("Memory vectors", (o.memory&&o.memory.store_size!=null)?o.memory.store_size:"—"),
    card("Requests seen", lat.count||0, lat.avg_latency_ms!=null?`avg ${lat.avg_latency_ms} ms · p95 ${lat.p95_latency_ms} ms`:""),
  ].join("");
  banner("");
  return o;
}

async function loadEvents(){
  const d = await api("/v1/admin/events?limit=40");
  const rows = d.events||[];
  $("#evCount").textContent = rows.length ? `(${rows.length})` : "";
  const tb = $("#eventsTable tbody");
  if(!rows.length){ tb.innerHTML = `<tr><td colspan="5" class="muted" style="padding:14px;">no events yet</td></tr>`; return; }
  tb.innerHTML = rows.map(r=>`<tr>
    <td class="mono muted">${fmtTime(r.ts)}</td>
    <td class="role-${esc(r.role)}">${esc(r.role)}</td>
    <td class="mono">${esc(r.model||"—")}</td>
    <td>${r.adapter?chip(r.adapter):"—"}</td>
    <td><pre>${esc(r.text)}</pre></td></tr>`).join("");
}

async function loadTraces(){
  const d = await api("/v1/admin/traces?limit=30");
  const tb = $("#tracesTable tbody");
  $("#trInfo").textContent = d.enabled ? (d.file?`· ${d.file}`:"· no file yet") : "· disabled (tracing.enabled=false)";
  const rows = d.traces||[];
  if(!rows.length){ tb.innerHTML = `<tr><td colspan="5" class="muted" style="padding:14px;">${d.enabled?'no traces yet':'tracing disabled'}</td></tr>`; return; }
  tb.innerHTML = rows.map(r=>`<tr>
    <td class="mono muted">${fmtTime(r.ts)}</td>
    <td class="mono">${esc(r.model||"—")}</td>
    <td>${r.adapter?chip(r.adapter):"—"}</td>
    <td class="mono">${r.latency_ms!=null?r.latency_ms+" ms":"—"}</td>
    <td><pre>${esc((r.response&&r.response.content)||"")}</pre></td></tr>`).join("");
}

async function refreshAll(){
  if(!TOKEN){ banner("Enter your gateway bearer token and click Connect."); return; }
  await loadHealth();
  try { await loadOverview(); await loadEvents(); await loadTraces(); }
  catch(e){ banner(e.message); }
}

async function doSearch(){
  const q = $("#q").value.trim();
  if(!q) return;
  const box = $("#searchResults"); box.innerHTML = "searching…";
  try{
    const d = await api("/v1/admin/memory/search", { method:"POST", body: JSON.stringify({ query:q, top_k:8 }) });
    const res = d.results||[];
    if(!res.length){ box.innerHTML = `<span class="muted">no matches${d.note?` — ${esc(d.note)}`:""}</span>`; return; }
    box.innerHTML = res.map(r=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);">
      <div class="small muted">${r._score!=null?`sim ${r._score.toFixed(3)} · `:""}${esc(r.role||"")} ${r.model?("· "+esc(r.model)):""}</div>
      <pre>${esc(r.text)}</pre></div>`).join("");
  }catch(e){ box.innerHTML = `<span class="muted">${esc(e.message)}</span>`; }
}

function setAuto(on){
  if(timer){ clearInterval(timer); timer=null; }
  if(on){ timer = setInterval(refreshAll, 5000); }
}

$("#save").onclick = () => { TOKEN = $("#token").value.trim(); localStorage.setItem("ummg_token", TOKEN); refreshAll(); };
$("#refresh").onclick = refreshAll;
$("#searchBtn").onclick = doSearch;
$("#q").addEventListener("keydown", e=>{ if(e.key==="Enter") doSearch(); });
$("#auto").onchange = e => setAuto(e.target.checked);

setAuto(true);
(async () => { await tryAutoFillToken(); refreshAll(); })();
</script>
</body>
</html>
